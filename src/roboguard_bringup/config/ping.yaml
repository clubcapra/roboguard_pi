/ping_steamdeck:
  ros__parameters:
    # Target IP (or hostname) to ping
    ip: "192.168.2.4"

    # Seconds without a successful ping before the connection is marked as dead
    timeout: 5.0

    # Seconds between ping attempts
    interval: 1.0

    # Per-ping reply timeout in seconds (how long to wait for a single echo reply)
    # Note: the system `ping -W` flag takes integer seconds on Linux, so values
    # below 1.0 will be rounded up to 1.
    ping_timeout: 1.0
