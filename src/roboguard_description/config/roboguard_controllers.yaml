# This config file is used by ros2_control
controller_manager:
  ros__parameters:
    # KEEP THIS VALUE ABOVE 60 HZ
    # For some reason, ovis hates getting commands at less than 60 HZ
    update_rate: 100  # Hz
    

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    odrive_controller:
      type: odrive_controller_interface/BetterODriveControllerInterface
    
    diff_drive_controller:
      type: diff_drive_controller/DiffDriveController

    ovis_controller:
      type: forward_command_controller/ForwardCommandController


ovis_controller:
  ros__parameters:
    joints:
      - ovis_joint_1
      - ovis_joint_2
      - ovis_joint_3
      - ovis_joint_4
      - ovis_joint_5
      - ovis_joint_6
    interface_name: velocity

odrive_controller:
  ros__parameters:
    joint_names: ["track_fl_j", "track_fr_j", "track_rl_j", "track_rr_j"]
    # absolute_position_names: [] # TODO: Add flippers here

diff_drive_controller:
  ros__parameters:
    right_wheel_names: ["track_fr_j", "track_rr_j"]
    left_wheel_names: ["track_fl_j", "track_rl_j"]

    wheel_separation: 0.230
    wheel_radius: 0.11

    wheel_separation_multiplier: 10.0
    left_wheel_radius_multiplier: -0.0325
    right_wheel_radius_multiplier: 0.0325

    publish_rate: 20.0
    odom_frame_id: odom
    # allow_multiple_cmd_vel_publishers: true
    base_frame_id: base_link
    pose_covariance_diagonal : [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]
    twist_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]

    open_loop: true
    enable_odom_tf: true

    cmd_vel_timeout: 2.0
    # publish_limited_velocity: true
    # publish_cmd: true
    # velocity_rolling_window_size: 10
    use_stamped_vel: false

    # Maybe we should set this to false since the max velocity is set from ODrive config
    linear.x.has_velocity_limits: true
    linear.x.has_acceleration_limits: false
    linear.x.has_jerk_limits: false
    linear.x.max_velocity: 5.0
    linear.x.min_velocity: -5.0
    # linear.x.max_acceleration: 2.0
    # linear.x.min_acceleration: -2.0
    # linear.x.max_jerk: 0.0
    # linear.x.min_jerk: 0.0

    # This might still be useful though since we might want to limit the max spin speed
    angular.z.has_velocity_limits: true
    angular.z.has_acceleration_limits: false
    angular.z.has_jerk_limits: false
    angular.z.max_velocity: 1.0
    angular.z.min_velocity: -1.0
    # angular.z.max_acceleration: 3.0
    # angular.z.min_acceleration: -3.0
    # angular.z.max_jerk: 0.0
    # angular.z.min_jerk: 0.0
