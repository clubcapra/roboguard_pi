# .github/workflows/build.yaml
name: ROS2 roboguard build
run-name: ${{ github.actor }} is working on ROS2 roboguard build
on: [pull_request]
jobs:
  Build_roboguard:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
    - name: Check out the repository
      uses: actions/checkout@v3
      with:
        submodules: recursive

    - name: Build docker compose
      run: |
        docker compose build --build-arg USER_UID=$(id -u) --build-arg USER_GID=$(id -g)

    - name: Build roboguard
      run: |
        docker compose run devcontainer bash -c "colcon build --symlink-install"

    - name: Test roboguard
      run: |
        docker compose run devcontainer bash -c "colcon test --packages-ignore micro_ros_setup"

    - name: Launch test - real.launch.py (with ovis, mocked)
      run: |
        docker compose run devcontainer bash -c "
          source /opt/ros/humble/setup.bash &&
          source install/setup.bash &&
          ./ci_launch_test.sh real-with-ovis roboguard_bringup real.launch.py \
            use_mock_odrives:=true \
            use_mock_ovis:=true \
            with_ovis:=true \
            with_rosbag:=false
        "

    - name: Launch test - real.launch.py (without ovis, mocked)
      run: |
        docker compose run devcontainer bash -c "
          source /opt/ros/humble/setup.bash &&
          source install/setup.bash &&
          ./ci_launch_test.sh real-no-ovis roboguard_bringup real.launch.py \
            use_mock_odrives:=true \
            use_mock_ovis:=true \
            with_ovis:=false \
            with_rosbag:=false
        "

    - name: Launch test - teleop.launch.py
      run: |
        docker compose run devcontainer bash -c "
          source /opt/ros/humble/setup.bash &&
          source install/setup.bash &&
          ./ci_launch_test.sh teleop roboguard_bringup teleop.launch.py
        "